<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, 
          user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>GalleryOS AR</title>

  <!-- 
      CRITICAL LOADING ORDER:
      A-Frame must be fully loaded before AR.js.
      Both must be loaded before any scene HTML is parsed.
      Using synchronous script tags (no defer, no async) in <head>
      guarantees this order. This is intentional and correct for A-Frame.
    -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.2/aframe/build/aframe-ar.js"></script>

  <style>
    /* 
        These styles are CRITICAL.
        A-Frame sets a-scene to position:fixed which is correct.
        We must ensure nothing interferes with it.
      */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      /* CRITICAL: #000 hides AR.js video on iOS */
    }

    #bg-fill {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: -3;
      /* Placed behind AR.js video which is z-index: -2 */
    }

    /* Back button overlaid on top of AR scene */
    #back-btn {
      position: fixed;
      top: env(safe-area-inset-top, 16px);
      left: 16px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      border-radius: 50px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Bottom info bar */
    #info-bar {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 0);
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #artwork-title {
      color: #F0F0FF;
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      font-weight: bold;
    }

    #artist-name {
      color: #8888AA;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      margin-top: 2px;
    }

    /* Like button */
    #like-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      border-radius: 50px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
    }

    #like-btn.liked {
      background: rgba(255, 60, 60, 0.3);
      border-color: rgba(255, 60, 60, 0.5);
    }

    /* GPS status indicator */
    #gps-status {
      position: fixed;
      top: env(safe-area-inset-top, 16px);
      right: 16px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      border-radius: 50px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: monospace;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .gps-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF4444;
      animation: gpsFlash 1s infinite;
    }

    .gps-dot.ready {
      background: #44FF88;
      animation: none;
    }

    @keyframes gpsFlash {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    /* Loading overlay — shown while GPS acquires */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: rgba(10, 10, 15, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Start overlay to capture iOS permissions */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(10, 10, 15, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px;
      text-align: center;
      transition: opacity 0.3s ease;
    }

    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .start-btn {
      background: #4488FF;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 32px;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(68, 136, 255, 0.4);
      width: 100%;
      max-width: 280px;
      margin-top: 10px;
    }

    .start-title {
      color: #F0F0FF;
      font-family: 'Space Mono', monospace;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .start-sub {
      color: #8888AA;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      max-width: 300px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(68, 136, 255, 0.2);
      border-top-color: #4488FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      color: #F0F0FF;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
    }

    .loading-sub {
      color: #8888AA;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      text-align: center;
      max-width: 240px;
    }

    /* Unlock overlay for paid content */
    #unlock-overlay {
      position: fixed;
      inset: 0;
      z-index: 9997;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }

    #unlock-overlay.hidden {
      display: none;
    }

    .lock-icon {
      font-size: 48px;
      animation: lockPulse 2s ease-in-out infinite;
    }

    @keyframes lockPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    .unlock-title {
      color: #F0F0FF;
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: bold;
    }

    .unlock-price {
      color: #4488FF;
      font-family: monospace;
      font-size: 24px;
      background: rgba(68, 136, 255, 0.15);
      border: 1px solid rgba(68, 136, 255, 0.3);
      border-radius: 50px;
      padding: 6px 20px;
    }

    .unlock-btn {
      background: #4488FF;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 32px;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(68, 136, 255, 0.4);
      width: 100%;
      max-width: 280px;
    }

    .back-link {
      color: #8888AA;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }

    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap');
  </style>
</head>

<body>
  <!-- Dark fallback background strictly behind the AR camera feed -->
  <div id="bg-fill"></div>

  <!-- Back button -->
  <button id="back-btn" onclick="goBack()">
    ← Back
  </button>

  <!-- GPS accuracy indicator -->
  <div id="gps-status">
    <div class="gps-dot" id="gps-dot"></div>
    <span id="gps-text">Locating...</span>
  </div>

  <!-- Bottom info bar (populated by JS) -->
  <div id="info-bar">
    <div>
      <div id="artwork-title">Loading...</div>
      <div id="artist-name"></div>
    </div>
    <button id="like-btn" onclick="handleLike()">
      <span id="like-icon">♡</span>
      <span id="like-count">0</span>
    </button>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">Opening AR</div>
    <div class="loading-sub">Point your camera at the world and wait for GPS</div>
  </div>

  <!-- Start overlay (captures gesture for iOS) -->
  <div id="start-overlay">
    <div class="start-title">Start AR Experience</div>
    <div class="start-sub">We need access to your Camera, Location, and Device Motion to anchor art correctly.</div>
    <button class="start-btn" onclick="startAR()">Allow Access & Start</button>
    <button class="back-link" onclick="goBack()" style="margin-top: 10px;">Return to Map</button>
  </div>

  <!-- Unlock overlay (shown for paid content) -->
  <div id="unlock-overlay" class="hidden">
    <div class="lock-icon">🔒</div>
    <div class="unlock-title" id="unlock-title">Locked Artwork</div>
    <div class="unlock-price" id="unlock-price">£0.99</div>
    <button class="unlock-btn" onclick="goToUnlock()">
      Unlock & View Forever
    </button>
    <button class="back-link" onclick="goBack()">Maybe later</button>
  </div>

  <!-- Container for dynamic A-Frame scene -->
  <div id="scene-container"
    style="position: fixed; inset: 0; z-index: 0; pointer-events: auto; width: 100%; height: 100%;">
    <!-- Scene injected via JavaScript -->
  </div>

  <script>
    // ── Read URL params ──────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const artworkId = params.get('id');
    const mediaUrl = params.get('mediaUrl');
    const mediaType = params.get('mediaType');
    const lat = parseFloat(params.get('lat') || '0');
    const lng = parseFloat(params.get('lng') || '0');
    const title = params.get('title') || 'Untitled';
    const artistName = params.get('artistName') || '';
    const isPaid = params.get('isPaid') === 'true';
    const price = parseFloat(params.get('price') || '0');
    const appOrigin = params.get('origin') || window.location.origin;

    // ── Check unlock state ───────────────────────────────────────────
    const isUnlocked =
      !isPaid ||
      localStorage.getItem('unlocked_' + artworkId) === 'true' ||
      sessionStorage.getItem('viewonce_' + artworkId) === 'true' ||
      params.get('unlocked') === 'true';

    // ── Populate UI ─────────────────────────────────────────────────
    document.getElementById('artwork-title').textContent = title;
    document.getElementById('artist-name').textContent = artistName
      ? 'by ' + artistName : '';

    // ── Show unlock overlay if needed ────────────────────────────────
    if (!isUnlocked) {
      document.getElementById('unlock-overlay').classList.remove('hidden');
      document.getElementById('unlock-title').textContent = title;
      document.getElementById('unlock-price').textContent =
        '£' + price.toFixed(2);
    }

    // ── Navigation helpers ───────────────────────────────────────────
    function goBack() {
      if (document.referrer) {
        window.history.back();
      } else {
        window.location.href = appOrigin + '/map';
      }
    }

    function goToUnlock() {
      window.location.href = appOrigin + '/ar/' + artworkId;
    }

    // ── Like functionality (Firebase REST API — no SDK needed) ───────
    const FIREBASE_PROJECT = params.get('fbProject');
    let likeCount = parseInt(params.get('likes') || '0');
    let hasLiked = false;

    try {
      const likedList = JSON.parse(
        localStorage.getItem('liked_artworks') || '[]'
      );
      hasLiked = likedList.includes(artworkId);
    } catch (e) { }

    document.getElementById('like-count').textContent = likeCount;
    if (hasLiked) {
      document.getElementById('like-btn').classList.add('liked');
      document.getElementById('like-icon').textContent = '♥';
    }

    function handleLike() {
      if (hasLiked) return;
      hasLiked = true;
      likeCount++;
      document.getElementById('like-count').textContent = likeCount;
      document.getElementById('like-btn').classList.add('liked');
      document.getElementById('like-icon').textContent = '♥';

      // Animate
      const btn = document.getElementById('like-btn');
      btn.style.transform = 'scale(1.3)';
      setTimeout(() => btn.style.transform = 'scale(1)', 200);

      // Store locally
      try {
        const likedList = JSON.parse(
          localStorage.getItem('liked_artworks') || '[]'
        );
        likedList.push(artworkId);
        localStorage.setItem('liked_artworks', JSON.stringify(likedList));
      } catch (e) { }

      // Update Firestore via REST (no SDK needed in plain HTML)
      if (FIREBASE_PROJECT) {
        fetch(
          'https://firestore.googleapis.com/v1/projects/' +
          FIREBASE_PROJECT +
          '/databases/(default)/documents/artworks/' + artworkId,
          {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fields: {
                likes: { integerValue: likeCount }
              }
            })
          }
        ).catch(e => console.error('Like update failed:', e));
      }
    }

    async function startAR() {
      // 1. Request Device Motion for iOS 13+
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const permissionState = await DeviceOrientationEvent.requestPermission();
          if (permissionState !== 'granted') {
            alert("Motion access is required for AR to work.");
            return;
          }
        } catch (e) {
          console.error(e);
        }
      }

      document.getElementById('start-overlay').classList.add('hidden');
      document.getElementById('loading-overlay').classList.remove('hidden');

      // 2. Build entity markup synchronously inside gesture handler
      let entityMarkup = '';
      const gpsAttr = `latitude: ${lat}; longitude: ${lng}`;

      if (isUnlocked && mediaUrl && lat && lng) {
        if (mediaType === 'image') {
          entityMarkup = `
            <a-assets>
              <img id="arImg" src="${mediaUrl}" crossorigin="anonymous">
            </a-assets>
            <a-image
              src="#arImg"
              gps-projected-entity-place="${gpsAttr}"
              look-at="[gps-projected-camera]"   
              scale="10 10 1"
              material="transparent: true; alphaTest: 0.1; side: double"
              animation="property: scale; from: 9.5 9.5 1; to: 10 10 1; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
            </a-image>
          `;
        } else if (mediaType === 'video') {
          entityMarkup = `
            <a-assets>
              <video id="arVideo" src="${mediaUrl}" autoplay loop crossorigin="anonymous" playsinline webkit-playsinline></video>
            </a-assets>
            <a-video
              src="#arVideo"
              gps-projected-entity-place="${gpsAttr}"
              look-at="[gps-projected-camera]"
              width="16" height="9"
              material="side: double">
            </a-video>
          `;
        } else if (mediaType === 'audio' || mediaType === 'voice') {
          // Fallback native audio to guarantee playback
          const audio = document.createElement('audio');
          audio.src = mediaUrl;
          audio.autoplay = true;
          audio.loop = true;
          document.body.appendChild(audio);

          const colors = ['#FF6B9D', '#4488FF', '#FFD700', '#44FF88'];
          const positions = [-0.6, -0.2, 0.2, 0.6];
          const durations = [400, 600, 500, 450];

          entityMarkup = `
            <a-assets>
              <audio id="arAudio" src="${mediaUrl}" autoplay loop crossorigin="anonymous"></audio>
            </a-assets>
            <a-entity gps-projected-entity-place="${gpsAttr}" look-at="[gps-projected-camera]">
              <a-box color="${colors[0]}" position="${positions[0]} 0 0" width="0.2" height="1" depth="0.2" animation="property: scale; from: 1 0.5 1; to: 1 2 1; dir: alternate; dur: ${durations[0]}; loop: true; easing: easeInOutSine"></a-box>
              <a-box color="${colors[1]}" position="${positions[1]} 0 0" width="0.2" height="1" depth="0.2" animation="property: scale; from: 1 1.5 1; to: 1 0.3 1; dir: alternate; dur: ${durations[1]}; loop: true; easing: easeInOutSine"></a-box>
              <a-box color="${colors[2]}" position="${positions[2]} 0 0" width="0.2" height="1" depth="0.2" animation="property: scale; from: 1 0.8 1; to: 1 1.8 1; dir: alternate; dur: ${durations[2]}; loop: true; easing: easeInOutSine"></a-box>
              <a-box color="${colors[3]}" position="${positions[3]} 0 0" width="0.2" height="1" depth="0.2" animation="property: scale; from: 1 1.2 1; to: 1 0.4 1; dir: alternate; dur: ${durations[3]}; loop: true; easing: easeInOutSine"></a-box>
            </a-entity>
          `;
        } else if (mediaType === 'model3d') {
          entityMarkup = `
            <a-entity
              gltf-model="${mediaUrl}"
              gps-projected-entity-place="${gpsAttr}"
              scale="2 2 2"
              animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
          `;
        }
      }

      // 3. Inject A-Frame scene
      const sceneHtml = `
          <a-scene
            vr-mode-ui="enabled: false"
            arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: best"
            renderer="antialias: true; alpha: true; precision: medium; logarithmicDepthBuffer: true"
            loading-screen="enabled: false"
            embedded
            id="ar-scene">
            <a-camera gps-projected-camera="originDestinationOffset: 0" rotation-reader></a-camera>
            ${entityMarkup}
          </a-scene>
      `;
      document.getElementById('scene-container').innerHTML = sceneHtml;

      // 4. Track GPS locally to dismiss loading screen
      let watchId;
      if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(
          (pos) => {
            const acc = Math.round(pos.coords.accuracy);
            document.getElementById('gps-text').textContent = '±' + acc + 'm';
            if (acc <= 30 && !gpsReady) {
              document.getElementById('gps-dot').classList.add('ready');
              gpsReady = true;
              hideLoadingOverlay();
            }
          },
          (err) => {
            document.getElementById('gps-text').textContent = 'GPS error';
            console.error("Geolocation error:", err);
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
        );
      } else {
        document.getElementById('gps-text').textContent = 'No GPS API';
      }

      setTimeout(() => {
        if (!gpsReady) {
          gpsReady = true;
          hideLoadingOverlay();
        }
      }, 10000);
    }

    function hideLoadingOverlay() {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.classList.add('hidden');
    }
  </script>

</body>

</html>
